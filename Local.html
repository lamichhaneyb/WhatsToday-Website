<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href = "style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap" rel="stylesheet">
  <title>WhatsToday?</title>
</head>
<body>

  <nav class="nav">
    <a href="index.html"><span class="nav-logo">WhatsToday?</span></a>
    <div class="nav-links">
      <a href="NewsToday.html">News Today</a>
      <a href="Holidays.html">Holidays</a>
      <a href="login.html">SignUp(for Now)</a>
      <a href="Local.html"><span class="current">Local</span></a>
      <a href="EventMap.html">Event Map</a>
      <a href="Birthdays.html">Birthdays</a>
      <a href="RandomDay.html">Random Day</a>
    </div>
  </nav>

  <div class="wrapper">
    <aside class="sidebar">
      <div class="date-pill">
        <span class="date-display date-long"></span>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        <h1 class="page-title">Local News</h1>
        <div class="localContainer">

          <!-- trending -->
          <section class="localSection">
            <h2 class="sectionTitle clickable">🔥 Trending Near You</h2>
            <div class="horizontalScroll" id="trendingSection">
              <!-- dynamic cards will go here -->
            </div>
          </section>
        
          <!-- live -->
          <section class="localSection">
            <h2 class="sectionTitle clickable">🎥 Live Around You</h2>
            <div class="horizontalScroll" id="liveSection">
              <!-- videos later -->
            </div>
          </section>
        
          <!-- alerts -->
          <section class="localSection">
            <h2 class="sectionTitle clickable">🚨 Alerts & Updates</h2>
            <div class="verticalFeed" id="alertsSection">
              <!-- quick updates -->
            </div>
          </section>
        
          <!-- explore -->
          <section class="localSection">
            <h2 class="sectionTitle clickable">📍 Explore Nearby</h2>
            <div class="gridLayout" id="exploreSection">
              <!-- places/events -->
            </div>
          </section>
        
          <!-- recommended -->
          <section class="localSection">
            <h2 class="sectionTitle clickable">⭐ Recommended For You</h2>
            <div class="horizontalScroll" id="recommendedSection">
              <!-- personalized -->
            </div>
          </section>

          <div class="contentArea" id="contentGrid"></div>
        
        </div>
      </div>
    </main>
  </div>

  

  <script src="js/date.js"></script>
  <script src="js/api.js"></script>
  <script src="js/local.js"></script>
<script src="js/local-layout.js"></script>
<script src="js/local-ui.js"></script>



</body>
</html>
